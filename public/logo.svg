<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="chain" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>

  <!-- Background shield -->
  <path d="M32 4 L56 14 L56 36 C56 50 44 60 32 62 C20 60 8 50 8 36 L8 14 Z" fill="url(#bg)"/>

  <!-- Chain link top -->
  <rect x="25" y="14" width="14" height="9" rx="4.5" fill="none" stroke="url(#chain)" stroke-width="2.5"/>
  <!-- Chain link middle left -->
  <rect x="16" y="27" width="14" height="9" rx="4.5" fill="none" stroke="url(#chain)" stroke-width="2.5"/>
  <!-- Chain link middle right -->
  <rect x="34" y="27" width="14" height="9" rx="4.5" fill="none" stroke="url(#chain)" stroke-width="2.5"/>
  <!-- Chain link bottom -->
  <rect x="25" y="40" width="14" height="9" rx="4.5" fill="none" stroke="url(#chain)" stroke-width="2.5"/>

  <!-- Connector lines -->
  <line x1="32" y1="23" x2="23" y2="27" stroke="#c4b5fd" stroke-width="2" opacity="0.8"/>
  <line x1="32" y1="23" x2="41" y2="27" stroke="#c4b5fd" stroke-width="2" opacity="0.8"/>
  <line x1="23" y1="36" x2="32" y2="40" stroke="#c4b5fd" stroke-width="2" opacity="0.8"/>
  <line x1="41" y1="36" x2="32" y2="40" stroke="#c4b5fd" stroke-width="2" opacity="0.8"/>

  <!-- Checkmark on bottom link -->
  <path d="M28.5 44.5 L31 47 L36 42" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
